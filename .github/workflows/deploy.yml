name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publicar public/ en gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          commit_message: "ci: deploy automático desde main"
